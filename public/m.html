<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Eluus</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0f14;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 32px;
      text-align: center;
      gap: 20px;
    }
    .logo { font-size: 48px; }
    h1 { font-size: 22px; font-weight: 700; color: #fff; }
    p { font-size: 15px; color: #94a3b8; line-height: 1.5; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #2a3044;
      border-top-color: #4a9eff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn {
      display: inline-block;
      margin-top: 8px;
      padding: 14px 32px;
      background: #4a9eff;
      color: #fff;
      border-radius: 16px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
    }
    #store-links { display: none; flex-direction: column; gap: 12px; width: 100%; max-width: 280px; }
  </style>
</head>
<body>
  <div class="logo">🚗</div>
  <h1>Eluus</h1>
  <div class="spinner" id="spinner"></div>
  <p id="msg">Abrindo o aplicativo...</p>
  <div id="store-links">
    <p>Não tem o Eluus instalado? Baixe agora:</p>
    <a class="btn" id="android-link" href="https://play.google.com/store/apps/details?id=app.eluus.app">📦 Google Play</a>
    <a class="btn" id="ios-link" href="https://apps.apple.com/app/eluus/id6746478789" style="background:#1a1f2e; display:none;">🍎 App Store</a>
  </div>
  <script>
    var params = new URLSearchParams(window.location.search);
    var codigo = (params.get('c') || '').toUpperCase();
    var ua = navigator.userAgent;
    var isAndroid = /Android/i.test(ua);
    var isIOS = /iPhone|iPad|iPod/i.test(ua);

    if (!codigo) {
      document.getElementById('msg').textContent = 'Link inválido.';
      document.getElementById('spinner').style.display = 'none';
    } else {
      // Tenta abrir o app via deep link
      window.location.href = 'eluus://cadastro?codigo=' + encodeURIComponent(codigo);

      setTimeout(function () {
        // Se ainda estiver na página, o app não está instalado
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('msg').textContent = 'Baixe o Eluus para adicionar este motorista.';
        var links = document.getElementById('store-links');
        links.style.display = 'flex';
        if (isIOS) {
          document.getElementById('ios-link').style.display = 'inline-block';
          document.getElementById('android-link').style.display = 'none';
        }
      }, 1500);
    }
  </script>
</body>
</html>
